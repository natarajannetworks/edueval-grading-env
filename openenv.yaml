name: grading-env
version: 1.0
description: "EduEval - Automated Answer Sheet Grading Environment with 3 distinct grading tasks: Factual, Conceptual and Essay grading."
entrypoint: python inference.py
env:
  python: "3.11"
tags:
  - openenv
  - education
  - grading
  - reinforcement-learning
  - real-world
tasks:
  - id: 1
    name: grading-easy
    description: "Factual Grading - Grade objective factual questions with clear right or wrong answers. Agent must identify correct answers and award full or zero marks."
    difficulty: easy
    question_type: factual
    max_steps: 3
    reward_range: [0.0, 1.0]
  - id: 2
    name: grading-medium
    description: "Conceptual Grading - Grade concept-based answers requiring partial credit. Agent must evaluate concept coverage and semantic understanding."
    difficulty: medium
    question_type: conceptual
    max_steps: 3
    reward_range: [0.0, 1.0]
  - id: 3
    name: grading-hard
    description: "Essay Grading - Grade complex descriptive essays requiring holistic evaluation of content accuracy concept coverage and critical analysis depth."
    difficulty: hard
    question_type: essay
    max_steps: 3
    reward_range: [0.0, 1.0]
action_space:
  marks_awarded:
    type: float
    range: [0.0, 1.0]
    description: "Marks awarded to student answer. Must be between 0.0 (wrong) and 1.0 (perfect)."
observation_space:
  question_text:
    type: string
    description: "The exam question being graded"
  student_answer:
    type: string
    description: "The student's response to be graded"
  answer_key:
    type: string
    description: "The reference correct answer"
  answer_summary:
    type: string
    description: "Summary of the student answer quality"
  semantic_similarity:
    type: float
    range: [0.0, 1.0]
    description: "Keyword-based similarity between student answer and answer key"
  concept_coverage:
    type: float
    range: [0.0, 1.0]
    description: "How well the student answer covers key concepts"
  question_number:
    type: int
    description: "Current question number in episode"
  total_questions:
    type: int
    description: "Total questions in this episode (always 3)"
  max_marks:
    type: float
    description: "Maximum marks available for this question"
  task_id:
    type: int
    description: "Task type (1=factual, 2=conceptual, 3=essay)"
  done:
    type: bool
    description: "Whether the episode is complete"
reward_function:
  type: dense
  description: "Task-specific reward functions. Factual uses strict binary-leaning rewards. Conceptual uses graduated partial credit. Essay uses holistic scoring with bonuses."
  range: [0.0, 1.0]
baseline:
  model: "Qwen/Qwen2.5-72B-Instruct"
  scores:
    grading-easy: 0.97
    grading-medium: 0.88
    grading-hard: 0.77
requirements:
  - fastapi==0.110.0
  - uvicorn==0.29.0
  - pydantic==2.7.4
  - pydantic-settings>=2.5.2
  - requests==2.31.0
  - openai>=1.23.0
  - numpy<2
  - openenv==0.1.13